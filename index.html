<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Voleibol Pro</title>
    <style>
        :root {
            --bg-color: #22252a;
            --home-color: #FF7F27; /* Cambiado a Naranja */
            --guest-color: #377E47; /* Cambiado a Verde Oscuro */
            --text-white: #ffffff;
            --gray-text: #8e9297;
            --panel-bg: #1b1d22;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #121417;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow-y: auto;
        }

        /* Contenedor Principal */
        .scoreboard-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 750px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Fila Superior: Nombres y Tiempo */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .team-label {
            display: inline-flex;
            align-items: center;
            font-size: 5.5vw;
            font-weight: bold;
            max-width: 38%;
            white-space: nowrap;
        }

        @media (min-width: 750px) {
            .team-label { font-size: 28px; }
        }

        .team-label-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            flex-shrink: 1;
        }

        .home-text { color: var(--home-color); transition: color 0.3s; }
        .guest-text { color: var(--guest-color); transition: color 0.3s; }

        /* --- ESTILOS DEL LOGO ADAPTABLE --- */
        .team-logo-img {
            height: 1.375em; /* Tamaño grande y adaptable */
            width: auto;     /* Mantiene su proporción original */
            margin-left: 10px;
            vertical-align: middle;
            border-radius: 4px;
            flex-shrink: 0;   /* Evita que el logo se aplaste */
            display: inline-block; 
        }

        /* Solo mostramos la imagen si el src está definido */
        .team-logo-img[src=""], .team-logo-img:not([src]) {
            display: none;
        }

        .timer-container {
            font-family: monospace;
            font-size: 5vw;
            color: var(--gray-text);
            letter-spacing: 1px;
        }
        @media (min-width: 750px) {
            .timer-container { font-size: 32px; }
        }

        /* Fila Central: Puntos y Sets */
        .main-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        /* Columnas de los Equipos (Marcador + Botón Restar) */
        .team-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 220px;
        }

        .points-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.3s;
        }

        .points-box:active {
            transform: scale(0.96);
        }

        .home-box { background-color: var(--home-color); }
        .guest-box { background-color: var(--guest-color); }

        .points-display {
            font-family: monospace;
            font-size: 15vw;
            font-weight: bold;
            color: var(--text-white);
        }
        @media (min-width: 750px) {
            .points-display { font-size: 110px; }
        }

        /* Botón de restar dedicado debajo de cada marcador */
        .minus-score-btn {
            width: 100%;
            background-color: #2d3139;
            border: 2px solid rgba(255,255,255,0.1);
            color: #e0e0e0;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .minus-score-btn:active {
            background-color: #404650;
        }

        /* Controles Centrales */
        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-width: 100px;
            margin-top: 15px;
        }

        .sets-row {
            display: flex;
            gap: 8px;
        }

        .set-box {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-white);
            transition: background-color 0.3s;
        }

        .home-set-box { background-color: var(--home-color); }
        .guest-set-box { background-color: var(--guest-color); }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .control-btn {
            background-color: #2d3139;
            border: none;
            color: var(--text-white);
            font-size: 20px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .control-btn:active {
            background-color: #404650;
            transform: scale(0.9);
        }

        /* Panel de Configuración */
        .settings-panel {
            background-color: var(--panel-bg);
            border-top: 2px solid #2d3139;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .settings-grid { grid-template-columns: 1fr 1fr; }
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-group label {
            color: var(--gray-text);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .inputs-inline {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .setting-group input[type="text"] {
            background-color: #2b2f36;
            border: 1px solid #404650;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            flex-grow: 1;
            width: 100%;
        }

        .setting-group input[type="color"] {
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="header-row">
            <div class="team-label home-text" id="label-home">
                <span class="team-label-text" id="text-home-display">ACDSAB</span>
                <span id="logo-space-left"></span> 
            </div>

            <div class="timer-container" id="timer">00:00</div>
            
            <div class="team-label guest-text" id="label-guest">
                <span class="team-label-text" id="text-guest-display">EL OTRO</span>
                <span id="logo-space-right"></span> 
            </div>
        </div>

        <div class="main-row">
            <div class="team-column home-column">
                <div class="points-box home-box" onclick="addPoint('home')">
                    <span class="points-display" id="home-points">00</span>
                </div>
                <button class="minus-score-btn" onclick="minusPoint('home')">− 1</button>
            </div>

            <div class="center-container">
                <div class="sets-row">
                    <div class="set-box home-set-box" id="home-sets">0</div>
                    <div class="set-box guest-set-box" id="guest-sets">0</div>
                </div>
                
                <div class="controls-grid">
                    <button class="control-btn" title="Restablecer set" onclick="resetCurrentSet()">↩</button>
                    <button class="control-btn" title="Intercambiar lados / campo" onclick="swapSides()">⇄</button>
                    <button class="control-btn" title="Reiniciar partido" onclick="resetMatch()">↻</button>
                    <button class="control-btn" title="Configuración" onclick="toggleSettings()">⚙️</button>
                </div>
            </div>

            <div class="team-column guest-column">
                <div class="points-box guest-box" onclick="addPoint('guest')">
                    <span class="points-display" id="guest-points">00</span>
                </div>
                <button class="minus-score-btn" onclick="minusPoint('guest')">− 1</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-grid">
                <div class="setting-group">
                    <label>EQUIPO IZQUIERDA</label>
                    <div class="inputs-inline">
                        <input type="text" id="input-home-name" value="ACDSAB" oninput="updateNames()">
                        <input type="color" id="input-home-color" value="#FF7F27" oninput="updateColors()">
                    </div>
                </div>
                <div class="setting-group">
                    <label>EQUIPO DERECHA</label>
                    <div class="inputs-inline">
                        <input type="text" id="input-guest-name" value="EL OTRO" oninput="updateNames()">
                        <input type="color" id="input-guest-color" value="#377E47" oninput="updateColors()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let homePoints = 0;
        let guestPoints = 0;
        let homeSets = 0;
        let guestSets = 0;
        let homeOnLeft = true; 

        // Cronómetro
        let seconds = 0;
        setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }, 1000);

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            if (panel.style.display === 'block') {
                setTimeout(() => { panel.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
            }
        }

        function updateNames() {
            const homeName = document.getElementById('input-home-name').value || 'HOME';
            const guestName = document.getElementById('input-guest-name').value || 'GUEST';
            document.getElementById('text-home-display').innerText = homeName.toUpperCase();
            document.getElementById('text-guest-display').innerText = guestName.toUpperCase();
        }

        function updateColors() {
            const homeColor = document.getElementById('input-home-color').value;
            const guestColor = document.getElementById('input-guest-color').value;
            document.documentElement.style.setProperty('--home-color', homeColor);
            document.documentElement.style.setProperty('--guest-color', guestColor);
        }

        function updateDisplay() {
            document.getElementById('home-points').innerText = homePoints.toString().padStart(2, '0');
            document.getElementById('guest-points').innerText = guestPoints.toString().padStart(2, '0');
            document.getElementById('home-sets').innerText = homeSets;
            document.getElementById('guest-sets').innerText = guestSets;
        }

        function updateLogos() {
            const logoHTML = `<img src="logo.png" alt="Logo" class="team-logo-img">`;
            
            if (homeOnLeft) {
                document.getElementById('logo-space-left').innerHTML = logoHTML;
                document.getElementById('logo-space-right').innerHTML = '';
            } else {
                document.getElementById('logo-space-left').innerHTML = '';
                document.getElementById('logo-space-right').innerHTML = logoHTML;
            }
        }

        function swapSides() {
            homeOnLeft = !homeOnLeft; 

            let tempPoints = homePoints;
            homePoints = guestPoints;
            guestPoints = tempPoints;

            let tempSets = homeSets;
            homeSets = guestSets;
            guestSets = tempSets;

            const inputHome = document.getElementById('input-home-name');
            const inputGuest = document.getElementById('input-guest-name');
            let tempName = inputHome.value;
            inputHome.value = inputGuest.value;
            inputGuest.value = tempName;

            const colorHome = document.getElementById('input-home-color');
            const colorGuest = document.getElementById('input-guest-color');
            let tempColor = colorHome.value;
            colorHome.value = colorGuest.value;
            colorGuest.value = tempColor;

            updateNames();
            updateColors();
            updateDisplay();
            updateLogos(); 
        }

        function addPoint(team) {
            if (team === 'home') homePoints++;
            else guestPoints++;
            checkSetWinner();
            updateDisplay();
        }

        function minusPoint(team) {
            if (team === 'home' && homePoints > 0) homePoints--;
            if (team === 'guest' && guestPoints > 0) guestPoints--;
            updateDisplay();
        }

        function checkSetWinner() {
            const homeName = document.getElementById('text-home-display').innerText;
            const guestName = document.getElementById('text-guest-display').innerText;
            const pointsToWin = (homeSets === 2 && guestSets === 2) ? 15 : 25;

            if (homePoints >= pointsToWin && (homePoints - guestPoints) >= 2) {
                homeSets++;
                alert(`¡Set para ${homeName}!`);
                resetSetPoints();
            }
            else if (guestPoints >= pointsToWin && (guestPoints - homePoints) >= 2) {
                guestSets++;
                alert(`¡Set para ${guestName}!`);
                resetSetPoints();
            }

            if (homeSets === 3) {
                alert(`¡PARTIDO TERMINADO!\nGanador: ${homeName}`);
                resetMatch(true);
            } else if (guestSets === 3) {
                alert(`¡PARTIDO TERMINADO!\nGanador: ${guestName}`);
                resetMatch(true);
            }
        }

        function resetSetPoints() {
            homePoints = 0;
            guestPoints = 0;
        }

        function resetCurrentSet() {
            if(confirm("¿Reiniciar puntos del set actual?")) {
                resetSetPoints();
                updateDisplay();
            }
        }

        function resetMatch(force = false) {
            if(force || confirm("¿Reiniciar el partido por completo?")) {
                homePoints = 0;
                guestPoints = 0;
                homeSets = 0;
                guestSets = 0;
                seconds = 0;
                updateDisplay();
            }
        }

        updateDisplay();
        updateLogos();
    </script>
</body>
</html>
