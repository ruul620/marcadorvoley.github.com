<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Voleibol Pro Móvil</title>
    <style>
        :root {
            --bg-color: #22252a;
            --home-color: #2196F3;
            --guest-color: #F44336;
            --text-white: #ffffff;
            --gray-text: #8e9297;
            --panel-bg: #1b1d22;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #121417;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow-y: auto; /* Permite scroll si la pantalla es muy pequeña */
        }

        /* Contenedor Principal Adaptable */
        .scoreboard-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 750px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Fila Superior: Nombres y Tiempo */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .team-label {
            font-size: 6vw; /* Tamaño fluido según el ancho de pantalla */
            font-weight: bold;
            max-width: 35%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (min-width: 750px) {
            .team-label { font-size: 28px; }
        }

        .home-text { color: var(--home-color); }
        .guest-text { color: var(--guest-color); }

        .timer-container {
            font-family: monospace;
            font-size: 5vw;
            color: var(--gray-text);
            letter-spacing: 1px;
        }
        @media (min-width: 750px) {
            .timer-container { font-size: 32px; }
        }

        /* Fila Central: Puntos y Sets */
        .main-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        /* Bloques de Puntuación Grandes y Flexibles */
        .points-box {
            flex: 1;
            max-width: 220px;
            aspect-ratio: 1 / 1; /* Cuadrado perfecto automático */
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .points-box:active {
            transform: scale(0.95);
        }

        .home-box { background-color: var(--home-color); }
        .guest-box { background-color: var(--guest-color); }

        .points-display {
            font-family: monospace;
            font-size: 16vw; /* Se encoge en pantallas pequeñas */
            font-weight: bold;
            color: var(--text-white);
        }
        @media (min-width: 750px) {
            .points-display { font-size: 110px; }
        }

        /* Contenedor Central */
        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 120px;
        }

        .sets-row {
            display: flex;
            gap: 10px;
        }

        .set-box {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-white);
        }

        .home-set-box { background-color: var(--home-color); }
        .guest-set-box { background-color: var(--guest-color); }

        /* Iconos de Control (Zona táctil mejorada) */
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 160px;
        }

        .control-btn {
            background-color: #2d3139;
            border: none;
            color: var(--text-white);
            font-size: 18px;
            width: 44px;  /* Tamaño mínimo recomendado para botones táctiles */
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .control-btn:active {
            background-color: #404650;
        }

        /* Panel de Configuración Responsivo */
        .settings-panel {
            background-color: var(--panel-bg);
            border-top: 2px solid #2d3139;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr; /* En móviles, uno debajo de otro */
            gap: 15px;
        }

        /* En tablets o PC, se ponen de lado a lado */
        @media (min-width: 480px) {
            .settings-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-group label {
            color: var(--gray-text);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .inputs-inline {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .setting-group input[type="text"] {
            background-color: #2b2f36;
            border: 1px solid #404650;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            flex-grow: 1;
            width: 100%;
        }

        .setting-group input[type="color"] {
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="header-row">
            <div class="team-label home-text" id="label-home">HOME</div>
            <div class="timer-container" id="timer">00:00</div>
            <div class="team-label guest-text" id="label-guest">GUEST</div>
        </div>

        <div class="main-row">
            <div class="points-box home-box" onclick="addPoint('home')">
                <span class="points-display" id="home-points">00</span>
            </div>

            <div class="center-container">
                <div class="sets-row">
                    <div class="set-box home-set-box" id="home-sets">0</div>
                    <div class="set-box guest-set-box" id="guest-sets">0</div>
                </div>
                
                <div class="controls-grid">
                    <button class="control-btn" title="Restar punto Local" onclick="minusPoint('home')">-L</button>
                    <button class="control-btn" title="Restablecer set" onclick="resetCurrentSet()">↩</button>
                    <button class="control-btn" title="Reiniciar partido" onclick="resetMatch()">↻</button>
                    <button class="control-btn" title="Restar punto Visitante" onclick="minusPoint('guest')">-V</button>
                    <button class="control-btn" title="Configuración" onclick="toggleSettings()">⚙️</button>
                </div>
            </div>

            <div class="points-box guest-box" onclick="addPoint('guest')">
                <span class="points-display" id="guest-points">00</span>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-grid">
                <div class="setting-group">
                    <label>EQUIPO LOCAL</label>
                    <div class="inputs-inline">
                        <input type="text" id="input-home-name" value="HOME" oninput="updateNames()">
                        <input type="color" id="input-home-color" value="#2196F3" oninput="updateColors()">
                    </div>
                </div>
                <div class="setting-group">
                    <label>EQUIPO VISITANTE</label>
                    <div class="inputs-inline">
                        <input type="text" id="input-guest-name" value="GUEST" oninput="updateNames()">
                        <input type="color" id="input-guest-color" value="#F44336" oninput="updateColors()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let homePoints = 0;
        let guestPoints = 0;
        let homeSets = 0;
        let guestSets = 0;

        // Cronómetro
        let seconds = 0;
        setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }, 1000);

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            
            // Auto-scroll hacia abajo para asegurar que el panel se vea al abrirse en pantallas cortas
            if (panel.style.display === 'block') {
                setTimeout(() => {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);
            }
        }

        function updateNames() {
            const homeName = document.getElementById('input-home-name').value || 'HOME';
            const guestName = document.getElementById('input-guest-name').value || 'GUEST';
            document.getElementById('label-home').innerText = homeName.toUpperCase();
            document.getElementById('label-guest').innerText = guestName.toUpperCase();
        }

        function updateColors() {
            const homeColor = document.getElementById('input-home-color').value;
            const guestColor = document.getElementById('input-guest-color').value;
            document.documentElement.style.setProperty('--home-color', homeColor);
            document.documentElement.style.setProperty('--guest-color', guestColor);
        }

        function updateDisplay() {
            document.getElementById('home-points').innerText = homePoints.toString().padStart(2, '0');
            document.getElementById('guest-points').innerText = guestPoints.toString().padStart(2, '0');
            document.getElementById('home-sets').innerText = homeSets;
            document.getElementById('guest-sets').innerText = guestSets;
        }

        function addPoint(team) {
            if (team === 'home') homePoints++;
            else guestPoints++;
            checkSetWinner();
            updateDisplay();
        }

        function minusPoint(team) {
            if (team === 'home' && homePoints > 0) homePoints--;
            if (team === 'guest' && guestPoints > 0) guestPoints--;
            updateDisplay();
        }

        function checkSetWinner() {
            const homeName = document.getElementById('label-home').innerText;
            const guestName = document.getElementById('label-guest').innerText;
            const pointsToWin = (homeSets === 2 && guestSets === 2) ? 15 : 25;

            if (homePoints >= pointsToWin && (homePoints - guestPoints) >= 2) {
                homeSets++;
                alert(`¡Set para ${homeName}!`);
                resetSetPoints();
            }
            else if (guestPoints >= pointsToWin && (guestPoints - homePoints) >= 2) {
                guestSets++;
                alert(`¡Set para ${guestName}!`);
                resetSetPoints();
            }

            if (homeSets === 3) {
                alert(`¡PARTIDO TERMINADO!\nGanador: ${homeName}`);
                resetMatch(true);
            } else if (guestSets === 3) {
                alert(`¡PARTIDO TERMINADO!\nGanador: ${guestName}`);
                resetMatch(true);
            }
        }

        function resetSetPoints() {
            homePoints = 0;
            guestPoints = 0;
        }

        function resetCurrentSet() {
            if(confirm("¿Reiniciar puntos del set actual?")) {
                resetSetPoints();
                updateDisplay();
            }
        }

        function resetMatch(force = false) {
            if(force || confirm("¿Reiniciar el partido por completo?")) {
                homePoints = 0;
                guestPoints = 0;
                homeSets = 0;
                guestSets = 0;
                seconds = 0;
                updateDisplay();
            }
        }

        updateDisplay();
    </script>
</body>
</html>
