<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Voleibol Pro Móvil</title>
    <style>
        :root {
            --bg-color: #22252a;
            --home-color: #2196F3;
            --guest-color: #F44336;
            --text-white: #ffffff;
            --gray-text: #8e9297;
            --panel-bg: #1b1d22;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #121417;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow-y: auto; /* Permite scroll si la pantalla es muy pequeña */
        }

        /* Contenedor Principal Adaptable */
        .scoreboard-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 750px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Fila Superior: Nombres y Tiempo */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .team-label {
            font-size: 6vw; /* Tamaño fluido según el ancho de pantalla */
            font-weight: bold;
            max-width: 35%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (min-width: 750px) {
            .team-label { font-size: 28px; }
        }

        .home-text { color: var(--home-color); }
        .guest-text { color: var(--guest-color); }

        .timer-container {
            font-family: monospace;
            font-size: 5vw;
            color: var(--gray-text);
            letter-spacing: 1px;
        }
        @media (min-width: 750px) {
            .timer-container { font-size: 32px; }
        }

        /* Fila Central: Puntos y Sets */
        .main-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        /* Bloques de Puntuación Grandes y Flexibles */
        .points-box {
            flex: 1;
            max-width: 220px;
            aspect-ratio: 1 / 1; /* Cuadrado perfecto automático */
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .points-box:active {
            transform: scale(0.95);
        }

        .home-box { background-color: var(--home-color); }
        .guest-box { background-color: var(--guest-color); }

        .points-display {
            font-family: monospace;
            font-size: 16vw; /* Se encoge en pantallas pequeñas */
            font-weight: bold;
            color: var(--text-white);
        }
        @media (min-width: 750px) {
            .points-display { font-size: 110px; }
        }

        /* Contenedor Central */
        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 120px;
        }

        .sets-row {
            display: flex;
            gap: 10px;
        }

        .set-box {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-white);
        }

        .home-set-box { background-color: var(--home-color); }
        .guest-set-box { background-color: var(--guest-color); }

        /* Iconos de Control (Zona táctil mejorada) */
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 160px;
        }

        .control-btn {
            background-color: #2d3139;
            border: none;
            color: var(--text-white);
            font-size: 18px;
            width: 44px;  /* Tamaño mínimo recomendado para botones táctiles */
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .control-btn:active {
            background-color: #404650;
        }

        /* Panel de Configuración Responsivo */
        .settings-panel {
            background-color: var(--panel-bg);
            border-top: 2px solid #2d3139;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr; /* En móviles, uno debajo de otro */
            gap: 15px;
        }

        /* En tablets o PC, se ponen de lado a lado */
        @media (min-width: 480px) {
            .settings-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-group label {
            color: var(--gray-text);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .inputs-inline {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .setting-group input[type="text"] {
            background-color: #2b2f36;
            border: 1px solid #404650;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            flex-grow: 1;
            width: 100%;
        }

        .setting-group input[type="color"] {
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="header-row">
            <div class="team-label home-text" id="label-home">HOME</div>
            <div class="timer-container" id="timer">00:00</div>
            <div class="team-label guest-text" id="label-guest">GUEST</div>
        </div>

        <div class="main-row">
            <div class="points-box home-box" onclick="addPoint('home')">
                <span class="points-display" id="home-points">00</span>
            </div>

            <div class="center-container">
                <div class="sets-row">
                    <div class="set-box home-set-box" id="home-sets">0</div>
                    <div class="set-box guest-set-box" id="guest-sets">0</div>
                </div>
                
                <div class="controls-grid">
                    <button class="control-btn" title="Restar punto Local
